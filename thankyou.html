    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif !important;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow: hidden;
        position: relative;
      }

      /* Floating particles background */
      .particles {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
      }

      .particle {
        position: absolute;
        width: 8px;
        height: 8px;
        background: rgba(236, 0, 140, 0.25);
        border-radius: 50%;
        animation: float-particle 15s infinite ease-in-out;
      }

      @keyframes float-particle {
        0%, 100% {
          transform: translateY(0) translateX(0) scale(1);
          opacity: 0;
        }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% {
          transform: translateY(-100vh) translateX(50px) scale(0.5);
          opacity: 0;
        }
      }

      /* Confetti animation */
      .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        background: #EC008C;
        animation: confetti-fall 3s ease-out forwards;
      }

      @keyframes confetti-fall {
        to {
          transform: translateY(100vh) rotate(720deg);
          opacity: 0;
        }
      }

      /* Main container */
      .container {
        background: white;
        border-radius: 20px;
        padding: 40px 40px;
        max-width: 600px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(236, 0, 140, 0.12);
        text-align: center;
        animation: container-enter 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        position: relative;
        z-index: 1;
      }

      @keyframes container-enter {
        0% {
          opacity: 0;
          transform: translateY(100px) scale(0.8) rotateX(20deg);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1) rotateX(0deg);
        }
      }

      /* Logo animation */
      .logo {
        width: 280px;
        max-width: 80%;
        margin: 0 auto 40px;
        animation: logo-fade-in 1s ease-out 0.3s both;
        filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
      }

      @keyframes logo-fade-in {
        0% {
          opacity: 0;
          transform: translateY(-30px) scale(0.9);
        }
        50% { transform: translateY(5px) scale(1.05); }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .logo img {
        width: 200px;
        height: 100px;
      }

      /* Success wrapper */
      .success-wrapper {
        margin: 30px auto 40px;
        position: relative;
        width: 150px;
        height: 150px;
        animation: success-wrapper-pop 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.6s both;
      }

      @keyframes success-wrapper-pop {
        0% {
          transform: scale(0) rotate(-180deg);
          opacity: 0;
        }
        50% { transform: scale(1.15) rotate(10deg); }
        100% {
          transform: scale(1) rotate(0deg);
          opacity: 1;
        }
      }

      /* Rotating rings */
      .ring {
        position: absolute;
        border-radius: 50%;
        border: 3px solid #EC008C;
        opacity: 0.3;
      }

      .ring-1 {
        width: 150px;
        height: 150px;
        top: 0;
        left: 0;
        animation: rotate-ring 8s linear infinite;
      }

      .ring-2 {
        width: 180px;
        height: 180px;
        top: -15px;
        left: -15px;
        animation: rotate-ring-reverse 10s linear infinite;
        opacity: 0.2;
      }

      @keyframes rotate-ring {
        0%   { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes rotate-ring-reverse {
        0%   { transform: rotate(360deg); }
        100% { transform: rotate(0deg); }
      }

      /* Success circle */
      .success-circle {
        width: 150px;
        height: 150px;
        background: linear-gradient(135deg, #EC008C 0%, #ff4db8 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        animation: pulse-glow 2s ease-in-out infinite;
        box-shadow: 0 10px 40px rgba(236, 0, 140, 0.4);
      }

      @keyframes pulse-glow {
        0%, 100% {
          box-shadow: 0 10px 40px rgba(236, 0, 140, 0.4);
          transform: scale(1);
        }
        50% {
          box-shadow: 0 15px 50px rgba(236, 0, 140, 0.6);
          transform: scale(1.05);
        }
      }

      /* Checkmark */
      .checkmark {
        width: 80px;
        height: 80px;
      }

      .checkmark svg {
        width: 80px;
        height: 80px;
        stroke: white;
        stroke-width: 5;
        fill: none;
        stroke-dasharray: 180;
        stroke-dashoffset: 180;
        animation: draw-check 1s ease-out 1.2s forwards;
      }

      @keyframes draw-check {
        to { stroke-dashoffset: 0; }
      }

      /* Text animations */
      .title {
        font-size: 42px;
        font-weight: 700;
        color: #000000;
        margin-bottom: 20px;
        animation: text-slide-up 0.8s ease-out 1.4s both;
        text-shadow: 2px 2px 4px rgba(236, 0, 140, 0.1);
      }

      @keyframes text-slide-up {
        0% {
          opacity: 0;
          transform: translateY(30px);
          filter: blur(10px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
          filter: blur(0);
        }
      }

      .message {
        font-size: 18px;
        color: #555;
        line-height: 1.6;
        margin-bottom: 15px;
        animation: text-slide-up 0.8s ease-out 1.6s both;
      }

      .sub-message {
        font-size: 16px;
        color: #777;
        margin-bottom: 40px;
        animation: text-slide-up 0.8s ease-out 1.8s both;
      }


      @keyframes button-appear {
        0% {
          opacity: 0;
          transform: translateY(20px) scale(0.9);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* Sparkle */
      .sparkle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: #EC008C;
        border-radius: 50%;
        animation: sparkle-twinkle 2s ease-in-out infinite;
        opacity: 0;
      }

      @keyframes sparkle-twinkle {
        0%, 100% { opacity: 0; transform: scale(0); }
        50%       { opacity: 1; transform: scale(1); }
      }

      @media (max-width: 600px) {
        .container { padding: 40px 25px; }
        .title { font-size: 32px; }
        .message { font-size: 16px; }
        .success-circle { width: 120px; height: 120px; }
        .success-wrapper { width: 120px; height: 120px; }
        .ring-1 { width: 120px; height: 120px; }
        .ring-2 { width: 150px; height: 150px; }
      }
    </style>
  </head>

    <div class="particles" id="particles"></div>

    <div class="container">
      <div class="logo">
       <img src="https://admission.nomadcollege.in/IMG/LOGO.webp" class="w-100" alt="Logo" />
      </div>

      <div class="success-wrapper">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="success-circle">
          <div class="checkmark">
            <svg viewBox="0 0 52 52">
              <path
                d="M14 27l8 8 16-16"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
        </div>
      </div>

      <h1 class="title">Thank You</h1>
      <p class="message">Your application has been submitted successfully.</p>
      <p class="sub-message">We will get back to you shortly.</p>

      <a href="/" class="btn btn-dark rounded-0 fs-5">Back To Home</a>
    </div>

    <script>
      function createParticles() {
        const particlesContainer = document.getElementById("particles");
        const particleCount = 30;
        for (let i = 0; i < particleCount; i++) {
          const particle = document.createElement("div");
          particle.className = "particle";
          particle.style.left = Math.random() * 100 + "%";
          particle.style.animationDelay = Math.random() * 15 + "s";
          particle.style.animationDuration = Math.random() * 10 + 10 + "s";
          particlesContainer.appendChild(particle);
        }
      }

      function createConfetti() {
        const colors = ["#EC008C", "#ff4db8", "#ffd700", "#ff6b6b", "#4ecdc4", "#f7b731"];
        const confettiCount = 60;
        for (let i = 0; i < confettiCount; i++) {
          setTimeout(() => {
            const confetti = document.createElement("div");
            confetti.className = "confetti";
            confetti.style.left = Math.random() * 100 + "%";
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = Math.random() * 10 + 5 + "px";
            confetti.style.height = confetti.style.width;
            confetti.style.animationDelay = Math.random() * 0.3 + "s";
            confetti.style.animationDuration = Math.random() * 2 + 2 + "s";
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 3500);
          }, i * 20);
        }
      }

      function createSparkles() {
        const successWrapper = document.querySelector(".success-wrapper");
        const sparkleCount = 8;
        for (let i = 0; i < sparkleCount; i++) {
          const sparkle = document.createElement("div");
          sparkle.className = "sparkle";
          const angle = (360 / sparkleCount) * i;
          const radius = 90;
          const x = Math.cos((angle * Math.PI) / 180) * radius;
          const y = Math.sin((angle * Math.PI) / 180) * radius;
          sparkle.style.left = `calc(50% + ${x}px)`;
          sparkle.style.top = `calc(50% + ${y}px)`;
          sparkle.style.animationDelay = i * 0.2 + "s";
          successWrapper.appendChild(sparkle);
        }
      }

      window.addEventListener("load", () => {
        createParticles();
        setTimeout(createConfetti, 800);
        setTimeout(createSparkles, 1200);
      });
    </script>
  </body>
